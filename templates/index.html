{% extends 'base.html' %}

{% block content %}

<form action="/add" method="POST" class="d-flex mb-4">
    <input type="text" name="content" class="form-control me-2" placeholder="Add a new task..." required>
    <button class="btn btn-primary">Add</button>
</form>

<ul class="list-group">
    {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

            <div>
                {% if task.completed %}
                    <s>{{ task.content }}</s>
                {% else %}
                    {{ task.content }}
                {% endif %}
            </div>

            <div>
                <a href="/complete/{{ task.id }}" class="btn btn-sm btn-success">✔</a>
                <a href="/update/{{ task.id }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="/delete/{{ task.id }}" class="btn btn-sm btn-danger">Delete</a>
            </div>

        </li>
    {% endfor %}
</ul>

{% endblock %}
